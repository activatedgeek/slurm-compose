_common:
  step_defaults: &step_defaults
    step_type: pyxis
    container_mounts:
      - /var/logs:/logs
      - /var/data:/data
      - /var/models:/models

jobs:
  eval:
    account: test_account
    partition: test_partition
    qos: test_qos
    time: 1h
    nodes: 2
    gpus_per_node: 8
    extra_argv:
      - --comment='test comment'
    steps:
      - <<: *step_defaults
        job_name: ray
        nodes: 2
        ntasks_per_node: 1
        gpus_per_node: 0
        overlap: true
        container_image: /var/images/ray.sqsh
        env:
          RAY_RUNTIME_DIR: "$(mktemp -u /logs/.rc/ray-XXXXXXX)"
        command:
          - /code/scripts/ray/slurm.sh
          - --num-cpus
          - 1
          - --num-gpus
          - 0
          - --object-store-memory
          - 104857600
          - --memory
          - 104857600
      - <<: *step_defaults
        job_name: vllm
        nodes: 2
        ntasks_per_node: 1
        cpus_per_task: 32
        gpus_per_node: 8
        container_image: /var/images/vllm.sqsh
        env:
          VLLM_RUNTIME_DIR: "$(mktemp -u /logs/.rc/vllm-XXXXXXX)"
        command:
          - /code/scripts/vllm/slurm.sh
          - /models/qwen3
          - --tensor-parallel-size
          - 8
          - --served-model-name
          - my/qwen3
          - --enable-prefix-caching
          - --model-loader-extra-config
          - "'{\"enable_multithread_load\": true, \"num_threads\": 64}'"
          - --enable-auto-tool-choice
          - --tool-call-parser
          - qwen3
          - --reasoning-parser
          - qwen3
      - <<: *step_defaults
        job_name: rollout
        nodes: 1
        ntasks_per_node: 1
        cpus_per_task: 32
        gpus_per_node: 0
        container_image: /var/images/rollout.sqsh
        env:
          MODEL_SERVICE_NAME: vllm
        command:
          - /code/scripts/rollout.sh
          - --data-dir
          - /data
          - --model
          - my/qwen3
